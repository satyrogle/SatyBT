name: Acquire Unity activation file

on:
  workflow_dispatch:

# Run Unity in the same Docker image GameCI uses, ask it to write a
# manual activation request (.alf), then upload the file as an artifact.
# This is a one-shot workflow — run it once, download the artifact,
# submit it at license.unity3d.com/manual to get the .ulf, then store
# the .ulf contents as the UNITY_LICENSE repo secret.

jobs:
  activation:
    name: Request .alf
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-2021.3.45f1-base-3
    steps:
      - name: Generate activation file
        run: |
          unity-editor \
            -batchmode \
            -nographics \
            -createManualActivationFile \
            -logFile /tmp/activation.log || true
          if ls ./*.alf 1>/dev/null 2>&1; then
            echo "Generated: $(ls ./*.alf)"
          else
            echo "::error::No .alf produced. Unity log:"
            cat /tmp/activation.log
            exit 1
          fi

      - name: Upload .alf
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v2021.3.45f1.alf
          path: ./*.alf
