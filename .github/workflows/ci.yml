name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# This repo IS a UPM package, not a Unity project, so GameCI cannot open the
# repo root directly. Instead we scaffold a minimal host project in the runner:
# the package is checked out under Packages/, a manifest embeds it (plus the
# test framework), and unity-test-runner points at that project root.
#
# GameCI needs a Unity Personal license. Add a repository secret named
# UNITY_LICENSE containing the full contents of your local .ulf file:
#   C:\ProgramData\Unity\Unity_lic.ulf
#
# All tests are plain [Test] (edit mode) methods, so only the editmode leg runs.
# Add a playmode job here if [UnityTest] coroutine tests are introduced later.

jobs:
  test:
    name: Test (editmode)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package
        uses: actions/checkout@v4
        with:
          lfs: true
          path: Packages/com.satyrogle.behaviour-tree

      - name: Scaffold host project
        run: |
          # Unity refuses to open a project path with no Assets/ folder.
          mkdir -p Assets ProjectSettings
          cat > Packages/manifest.json <<'JSON'
          {
            "dependencies": { "com.unity.test-framework": "1.1.33" },
            "testables": [ "com.satyrogle.behaviour-tree" ]
          }
          JSON
          echo 'm_EditorVersion: 2021.3.45f1' > ProjectSettings/ProjectVersion.txt

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-editmode
          restore-keys: |
            Library-

      - name: Run editmode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          # Pin to the 2021.3 LTS patch the package targets.
          unityVersion: 2021.3.45f1
          projectPath: .
          testMode: editmode
          artifactsPath: editmode-artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test results (editmode)
          path: editmode-artifacts
